name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Engine unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate all suites parse (dry-run)
        run: |
          python eval.py evals/example.yaml --dry-run
          for suite in evals/support/*.yaml; do python eval.py "$suite" --dry-run; done
